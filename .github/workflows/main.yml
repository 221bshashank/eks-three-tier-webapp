name: 3-Tier App CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  BACKEND_IMAGE: 3-tier-app-backend
  FRONTEND_IMAGE: 3-tier-app-frontend

jobs:
  # Job 1: Validate Kubernetes Manifests
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          curl -L https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

      - name: Validate Kubernetes Manifests
        run: |
          echo "Validating Kubernetes manifests..."
          for file in Kubernetes-Manifests-file/**/*.yaml; do
            echo "Validating: $file"
            kubeval "$file" || exit 1
          done

      - name: Check manifest structure
        run: |
          ls -la Kubernetes-Manifests-file/Backend/
          ls -la Kubernetes-Manifests-file/Frontend/
          ls -la Kubernetes-Manifests-file/Database/

  # Job 2: Build and Test Backend
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Application-Code/backend/package-lock.json

      - name: Install dependencies
        working-directory: Application-Code/backend
        run: npm ci

      - name: Run linter
        working-directory: Application-Code/backend
        run: npm run lint --if-present || echo "No lint script"

      - name: Run tests
        working-directory: Application-Code/backend
        run: npm test --if-present || echo "No test script"

      - name: Build Docker image
        working-directory: Application-Code/backend
        run: docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} .

      - name: Docker image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'

  # Job 3: Build and Test Frontend
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Application-Code/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Application-Code/frontend
        run: npm ci

      - name: Run linter
        working-directory: Application-Code/frontend
        run: npm run lint --if-present || echo "No lint script"

      - name: Run tests
        working-directory: Application-Code/frontend
        run: npm test --if-present || echo "No test script"

      - name: Build application
        working-directory: Application-Code/frontend
        run: npm run build

      - name: Build Docker image
        working-directory: Application-Code/frontend
        run: docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} .

      - name: Docker image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'

  # Job 4: Code Quality Analysis
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript'

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2

  # Job 5: Lint Infrastructure as Code
  lint-terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Lint Terraform
        run: |
          if [ -d "terraform" ]; then
            tflint --init
            tflint
          else
            echo "No terraform directory found"
          fi

  # Job 6: Summary Report
  summary:
    needs: [validate-manifests, build-backend, build-frontend, code-quality, lint-terraform]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "✅ Validation Complete"
          echo "- Kubernetes manifests validated"
          echo "- Backend built and tested"
          echo "- Frontend built and tested"
          echo "- Code quality analysis complete"
          echo "- Infrastructure linted"